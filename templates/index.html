<!DOCTYPE html>
<html>
<head>
    <title>Solar Power Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
            overflow-y: auto;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f, #c44569, #6c5ce7, #0984e3, #00b894, #fdcb6e, #ff6b6b);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            opacity: 0.9;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: float 20s infinite;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5),
                        0 0 100px rgba(255, 255, 255, 0.1) inset;
            animation: floatContainer 6s ease-in-out infinite;
            margin: auto;
        }

        @keyframes floatContainer {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .icon {
            text-align: center;
            font-size: 45px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 20px rgba(255, 200, 0, 0.8));
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h2 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 6px;
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            font-size: 12px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            position: relative;
            margin-bottom: 12px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: #ffffff;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3),
                        0 0 0 4px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Autofill styling */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: white;
            -webkit-box-shadow: 0 0 0px 1000px rgba(255, 255, 255, 0.2) inset;
            transition: background-color 5000s ease-in-out 0s;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.4s ease;
            margin-top: 8px;
            box-shadow: 0 6px 25px rgba(245, 87, 108, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 35px rgba(245, 87, 108, 0.7);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        /* Result display */
        .result {
            margin-top: 18px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            animation: resultFadeIn 0.5s ease;
        }

        @keyframes resultFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glow effect on container */
        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f, #c44569, #6c5ce7, #0984e3, #00b894, #fdcb6e, #ff6b6b);
            background-size: 400% 400%;
            border-radius: 25px;
            z-index: -1;
            animation: gradientShift 15s ease infinite;
            opacity: 0.5;
            filter: blur(20px);
        }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 40%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 60%; animation-delay: 5s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 2.5s;"></div>
    <div class="particle" style="left: 80%; animation-delay: 4.5s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 1.5s;"></div>

    <div class="container">
        <div class="icon">☀️</div>
        <h2>Solar Power Prediction</h2>
        <p class="subtitle">Enter environmental parameters to predict solar energy output</p>
        
        <form action="/predict" method="post">
            <div class="input-group">
                <input type="number" step="any" name="windspeed" placeholder="Wind Speed (m/s)" required>
            </div>

            <div class="input-group">
                <input type="number" step="any" name="sunshine" placeholder="Sunshine Duration (hours)" required>
            </div>

            <div class="input-group">
                <input type="number" step="any" name="airpressure" placeholder="Air Pressure (hPa)" required>
            </div>

            <div class="input-group">
                <input type="number" step="any" name="radiation" placeholder="Solar Radiation (W/m²)" required>
            </div>

            <div class="input-group">
                <input type="number" step="any" name="airtemperature" placeholder="Air Temperature (°C)" required>
            </div>

            <div class="input-group">
                <input type="number" step="any" name="humidity" placeholder="Relative Humidity (%)" required>
            </div>

            <button type="submit">🔮 Predict Power Output</button>
        </form>

        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
